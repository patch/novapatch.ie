{% assign nav_links = site.site_nav[page.language] %}
{% if nav_links %}
<nav class="{{ include.class | default: 'site-links' | escape }}" aria-label="{{ include.label | default: 'Site navigation' | escape }}">
  <ul>
    {% for link in nav_links %}
    <li><a href="{{ link.url | escape }}"{% if link.rel %} rel="{{ link.rel | escape }}"{% endif %}>{{ link.title | escape }}</a></li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
