  <head>
    <meta charset="utf-8">
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    <meta name="citation_author" content="Patch, Nova">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if page.description %}<meta property="og:description" content="{{ page.description }}">{% endif %}
    <meta property="og:locale" content="{{ site.locales[page.language] }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="alternate" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}" hreflang="{{ page.language }}">
    {% for alternate in page.alternates -%}
    <link rel="alternate" href="{{ site.url }}/{{ alternate[0] }}/{{ alternate[1] }}" hreflang="{{ alternate[0] }}">
    {% endfor -%}
    <link rel="author" href="{{site.url}}/{{ page.language }}/{{ site.about[page.language] }}">
    <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=EB+Garamond&display=swap">
  </head>
