<h1 class="post-title">{{ page.title }}<span class="post-title-separator">{{ site.body_title_separator | default: " - " }}</span>{% if page.language == "en" -%}<a class="post-site-title" href="{{ site.baseurl }}/{{ page.language }}/">{{ site.display_title | default: site.title }}</a>{% else -%}<span class="post-site-title">{{ site.display_title | default: site.title }}</span>{% endif -%}</h1>
