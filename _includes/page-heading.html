<h1 class="post-title">{{ page.title | escape }}<span class="post-title-separator">{{ site.body_title_separator | default: " - " | escape }}</span>{% if page.language == "en" -%}<a class="post-site-title" href="{{ site.baseurl }}/{{ page.language | escape }}/">{{ site.display_title | default: site.title | escape }}</a>{% else -%}<span class="post-site-title">{{ site.display_title | default: site.title | escape }}</span>{% endif -%}</h1>
